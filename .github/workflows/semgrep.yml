name: Semgrep

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  schedule:
    - cron: "17 5 * * *" # execução diária
  workflow_dispatch: { }

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    # Evita problemas de permissões em PRs do dependabot
    if: (github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v4

      # Executa o Semgrep e gera relatório
      - name: Run Semgrep
        run: |
          if [ -n "${SEMGREP_APP_TOKEN_FROM_SECRET}" ]; then
            export SEMGREP_APP_TOKEN="${SEMGREP_APP_TOKEN_FROM_SECRET}"
          else
            export SEMGREP_RULES="p/default"
          fi

          semgrep ci --sarif > semgrep.sarif
        env:
          SEMGREP_APP_TOKEN_FROM_SECRET: ${{ secrets.SEMGREP_APP_TOKEN }}

      # Publica como artifact para consulta
      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep.sarif

      # Publica o SARIF no GitHub Code Scanning (aba Security)
      # Em PRs de forks, o token geralmente não tem permissão para security-events:write
      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: >
          always() &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: semgrep.sarif